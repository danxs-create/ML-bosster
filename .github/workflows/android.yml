name: Build APK From ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Project ZIP
        run: unzip -o ml-booster.zip -d project

      - name: Show Project Structure
        run: ls -R project

      - name: Find Project Root
        id: find_root
        run: |
          ROOT=$(find project -name gradlew | head -n 1 | xargs dirname)
          echo "root=$ROOT" >> $GITHUB_OUTPUT

      - name: Grant Execute Permission
        run: chmod +x "${{ steps.find_root.outputs.root }}/gradlew"

      - name: Build Debug APK
        run: |
          cd "${{ steps.find_root.outputs.root }}"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ML-Booster-APK
          path: |
            **/app/build/outputs/apk/debug/*.apk
